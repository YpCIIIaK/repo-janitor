name: "Repo Anti-Rot"
description: "Scan repository health/decay and post the report to a Repo Anti-Rot dashboard"
author: "Repo Anti-Rot"
branding:
  icon: "activity"
  color: "purple"
inputs:
  path:
    description: "Path to the repository to scan"
    required: false
    default: "."
  dashboard-url:
    description: "Base URL of the Repo Anti-Rot dashboard. The report is POSTed to <url>/api/ingest. Leave empty to skip upload."
    required: false
    default: ""
  token:
    description: "Bearer token for the dashboard ingest endpoint (matches REPO_ANTI_ROT_INGEST_TOKEN on the server)."
    required: false
    default: ""
  fail-on:
    description: "Fail the job when the grade is at or below this letter (A, B, C, D, F) or 'never' to never fail."
    required: false
    default: "never"
  github-token:
    description: "GitHub token (usually ${{ github.token }}) used to post a sticky health comment on pull requests. Needs 'pull-requests: write'. Leave empty to disable PR comments."
    required: false
    default: ""
  comment-on-pr:
    description: "Post/update a summary comment on the pull request (requires github-token and a pull_request event)."
    required: false
    default: "true"
  sarif-file:
    description: "Write findings as a SARIF 2.1.0 file at this path (e.g. repo-anti-rot.sarif) for upload via github/codeql-action/upload-sarif. Leave empty to skip."
    required: false
    default: ""
outputs:
  score:
    description: "Health score 0-100"
  grade:
    description: "Letter grade A-F"
  issues:
    description: "Total number of issues found"
runs:
  using: "node20"
  main: "dist/index.cjs"
